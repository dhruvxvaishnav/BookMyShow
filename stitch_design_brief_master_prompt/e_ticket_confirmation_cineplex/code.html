            background-image: radial-gradient(circle at 50% 50%, rgba(245,166,35,0.1) 0%, transparent 60%);
        }
        .stub-perforation {
            background-image: linear-gradient(to bottom, #161619 50%, transparent 50%);

            background-repeat: repeat-y;
        }

<body class="bg-void-black text-parchment-text min-h-screen flex flex-col font-body-main text-body-main relative overflow-x-hidden">
<!-- Confetti Overlay Effect (Simulated via gradients) -->
<div class="fixed inset-0 pointer-events-none z-0 confetti-overlay opacity-50">
<div class="absolute top-10 left-10 w-2 h-4 bg-antique-gold rounded-full rotate-45 opacity-60"></div>
<div class="absolute top-20 right-20 w-3 h-3 bg-royal-crimson rounded-full opacity-70"></div>
<div class="absolute top-1/4 left-1/3 w-4 h-2 bg-gold-foil rounded-sm -rotate-12 opacity-80"></div>
<div class="absolute top-1/3 right-1/4 w-2 h-5 bg-antique-gold rounded-full rotate-12 opacity-50"></div>
<div class="absolute top-1/2 left-20 w-3 h-3 bg-royal-crimson rounded-full opacity-60"></div>
</div>
<!-- Top Navigation (Suppressed per guidelines as this is a transactional success screen, but showing a minimal brand anchor) -->
<header class="w-full flex justify-center py-6 z-10">
<h1 class="text-antique-gold font-display-hero text-display-hero uppercase tracking-[0.2em] drop-shadow-[0_0_8px_rgba(245,166,35,0.4)]">CINEPLEX</h1>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-container-padding py-section-gap z-10 w-full max-w-4xl mx-auto">
<!-- Success Messaging -->
<div class="text-center mb-12">
<span class="material-symbols-outlined text-success-green text-5xl mb-4" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<h2 class="font-display-hero text-display-hero text-parchment-text mb-2">Booking Confirmed</h2>
<p class="font-body-main text-body-main text-muted-text">Your seats for the Grand Cinema are secured.</p>
</div>
<!-- The E-Ticket -->
<div class="w-full max-w-3xl flex flex-col md:flex-row bg-deep-surface rounded-xl overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.8)] border border-outline/20 relative group hover:drop-shadow-[0_0_15px_rgba(245,166,35,0.2)] transition-all duration-500">
<!-- Left Accent Stripe -->
<div class="h-2 md:h-auto md:w-2 bg-gradient-to-b from-royal-crimson via-antique-gold to-royal-crimson"></div>
<!-- Main Ticket Body -->
<div class="flex-grow p-8 flex flex-col md:flex-row gap-8 relative">
<!-- Movie Details -->
<div class="flex-1 space-y-6">
<div>
<p class="font-headline-marquee text-headline-marquee text-antique-gold mb-1 uppercase">Admit Two</p>
<h3 class="font-display-hero text-[32px] leading-tight text-parchment-text">Dune: Part Two</h3>
<p class="font-label-small text-label-small text-muted-text mt-2 uppercase tracking-widest">IMAX 70mm</p>
</div>
<div class="grid grid-cols-2 gap-6">
<div>
<p class="font-label-small text-label-small text-muted-text uppercase mb-1">Date &amp; Time</p>
<p class="font-data-mono text-data-mono text-parchment-text">Oct 14, 2024</p>
<p class="font-data-mono text-data-mono text-parchment-text">19:30 PM</p>
</div>
<div>
<p class="font-label-small text-label-small text-muted-text uppercase mb-1">Venue</p>
<p class="font-body-main text-body-main text-parchment-text">The Grand Palace</p>
<p class="font-data-mono text-data-mono text-muted-text text-sm">Screen 01</p>
</div>
</div>
<!-- Seat Chips -->
<div>
<p class="font-label-small text-label-small text-muted-text uppercase mb-2">Seats</p>
<div class="flex gap-3">
<div class="bg-surface border border-antique-gold px-4 py-2 rounded flex items-center justify-center min-w-[48px]">
<span class="font-data-mono text-data-mono text-antique-gold">F6</span>
</div>
<div class="bg-surface border border-antique-gold px-4 py-2 rounded flex items-center justify-center min-w-[48px]">
<span class="font-data-mono text-data-mono text-antique-gold">F7</span>
</div>
</div>
</div>
</div>
</div>
<!-- Perforation Line -->
<div class="hidden md:block w-px relative mx-4">
<!-- Top semi-circle cutout -->
<div class="absolute -top-4 -left-3 w-6 h-6 bg-void-black rounded-full z-10 border-b border-outline/20"></div>
<div class="absolute inset-y-0 left-0 w-px border-l-2 border-dashed border-outline/30"></div>
<!-- Bottom semi-circle cutout -->
<div class="absolute -bottom-4 -left-3 w-6 h-6 bg-void-black rounded-full z-10 border-t border-outline/20"></div>
</div>
<div class="md:hidden h-px relative my-4">
<div class="absolute -left-4 -top-3 w-6 h-6 bg-void-black rounded-full z-10"></div>
<div class="absolute inset-x-0 top-0 h-px border-t-2 border-dashed border-outline/30"></div>
<div class="absolute -right-4 -top-3 w-6 h-6 bg-void-black rounded-full z-10"></div>
</div>
<!-- Right Stub (QR Code) -->
<div class="w-full md:w-64 p-8 flex flex-col items-center justify-center bg-surface-container/50">
<div class="bg-surface p-4 rounded-lg border border-antique-gold/30 flex flex-col items-center shadow-[0_0_15px_rgba(245,166,35,0.1)]">
<!-- Simulated QR Code purely with CSS/HTML structure -->
<div class="w-32 h-32 grid grid-cols-5 grid-rows-5 gap-1 p-2 bg-black border border-antique-gold">
<div class="bg-antique-gold col-span-2 row-span-2"></div>
<div class="bg-transparent"></div>
<div class="bg-antique-gold col-span-2 row-span-2"></div>
<div class="bg-transparent col-start-3 row-start-2"></div>
<div class="bg-antique-gold col-span-2 row-span-2 col-start-1 row-start-4"></div>
<div class="bg-antique-gold col-start-4 row-start-4"></div>
<div class="bg-antique-gold col-start-5 row-start-5"></div>
<!-- center blocks -->
<div class="bg-antique-gold col-start-3 row-start-3"></div>
<div class="bg-antique-gold col-start-4 row-start-3"></div>
</div>
<p class="mt-4 font-data-mono text-label-small text-muted-text tracking-widest uppercase">ID: 8X9Q-2M4L</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-12 flex flex-col sm:flex-row gap-6 w-full max-w-md justify-center">
<button class="bg-antique-gold text-surface font-body-main text-body-main font-semibold py-4 px-6 rounded hover:bg-gold-foil hover:drop-shadow-[0_0_10px_rgba(245,166,35,0.5)] transition-all duration-300 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="download">download</span>
                Download / Print Ticket
            </button>
<button class="bg-transparent border border-antique-gold text-antique-gold font-body-main text-body-main font-semibold py-4 px-6 rounded hover:bg-antique-gold/10 transition-all duration-300">
                View My Bookings
            </button>
</div>
</main>
