<html class="dark" lang="en"><head>

<title>Cineplex - Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {

                        "antique-gold": "#F5A623",
                        "surface-tint": "#ffb955",

                        "recliner-teal": "#06B6D4",

                        "seat-red": "#EF4444",
                        "outline-variant": "#524534",
                        "deep-surface": "#161619",
                        "primary-fixed-dim": "#ffb955",
                        "success-green": "#22C55E",
                        "void-black": "#0D0D0F",

                        "on-primary-fixed": "#291800",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",

                    },
                    "spacing": {

                        "container-padding": "24px",
                        "gutter": "16px",
                        "hero-height": "70vh",
                        "unit": "8px"
                    },
                    "fontFamily": {

                        "body-main": ["Inter"]
                    },
                    "fontSize": {
                        "display-hero": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],

    </script>

<body class="bg-void-black text-parchment-text font-body-main min-h-screen flex flex-col justify-center items-center p-4">
<!-- Background Image / Atmosphere -->
<div class="fixed inset-0 z-0 opacity-20 bg-cover bg-center" data-alt="A grand, dark cinematic auditorium interior. Deep shadows and a moody atmosphere. Subtle highlights of antique gold and deep crimson velvet textures. The scene evokes a sense of prestige and classic Hollywood glamour reimagined for modern OLED displays." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDksNKQHYEXU49a1x6Y7sboVDiIgEdMdHwI69GqjFNtTPZssUuVrUP_ZMJk3QMcFrCxvq9-voNjJFIo8hX2mkgqP2K5UdWPObVPTDNSv--nexlB-b9ZX0FgBySx8trEpAwLGQ4TL-jns1X7z3BgS2yZkLrABF33XU2K57tnsI2VDMgjsNj46Jmt5Q2BRCITcHbleGTh4Rkn1a53iaZNt6qqcWx-zLcZJVU_M956GpudNDkskxHmqkgB-uacMQp5IdCKv-Jo7kMsu_H7')">
</div>
<!-- Registration Card -->
<main class="relative z-10 w-full max-w-md bg-deep-surface rounded-DEFAULT shadow-[0_20px_50px_rgba(0,0,0,0.9)] overflow-hidden border border-outline/20">
<!-- Accent Bar -->
<div class="h-1 w-full bg-gradient-to-r from-royal-crimson via-antique-gold to-royal-crimson"></div>
<div class="p-8 sm:p-12 relative group">
<!-- Art Deco Corner Brackets (Hover Reveal) -->
<div class="absolute top-4 left-4 w-4 h-4 border-t border-l border-antique-gold opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<div class="absolute top-4 right-4 w-4 h-4 border-t border-r border-antique-gold opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<div class="absolute bottom-4 left-4 w-4 h-4 border-b border-l border-antique-gold opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<div class="absolute bottom-4 right-4 w-4 h-4 border-b border-r border-antique-gold opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<!-- Logo Area -->
<div class="flex justify-center mb-8">
<span class="font-headline-marquee text-headline-marquee text-antique-gold tracking-[0.2em] uppercase">Cineplex</span>
</div>
<!-- Header -->
<div class="text-center mb-8">
<h1 class="font-display-hero text-display-hero text-parchment-text mb-2 text-3xl">Create your account</h1>
<p class="font-body-main text-body-main text-muted-text text-sm">Join the grand cinema experience.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Full Name -->
<div>
<label class="block font-label-small text-label-small text-stone-text mb-1 uppercase tracking-wider" for="name">Full Name</label>
<input class="w-full bg-deep-surface border border-outline-variant rounded-DEFAULT py-3 px-4 font-body-main text-body-main text-parchment-text placeholder-muted-text focus:outline-none focus:border-antique-gold focus:ring-1 focus:ring-antique-gold focus:drop-shadow-[0_0_8px_rgba(245,166,35,0.4)] transition-all" id="name" name="name" required="" type="text"/>
</div>
<!-- Email Address -->
<div>
<label class="block font-label-small text-label-small text-stone-text mb-1 uppercase tracking-wider" for="email">Email Address</label>
<input class="w-full bg-deep-surface border border-outline-variant rounded-DEFAULT py-3 px-4 font-body-main text-body-main text-parchment-text placeholder-muted-text focus:outline-none focus:border-antique-gold focus:ring-1 focus:ring-antique-gold focus:drop-shadow-[0_0_8px_rgba(245,166,35,0.4)] transition-all" id="email" name="email" required="" type="email"/>
</div>
<!-- Password -->
<div>
<label class="block font-label-small text-label-small text-stone-text mb-1 uppercase tracking-wider" for="password">Password</label>
<input class="w-full bg-deep-surface border border-outline-variant rounded-DEFAULT py-3 px-4 font-body-main text-body-main text-parchment-text placeholder-muted-text focus:outline-none focus:border-antique-gold focus:ring-1 focus:ring-antique-gold focus:drop-shadow-[0_0_8px_rgba(245,166,35,0.4)] transition-all" id="password" name="password" required="" type="password"/>
<p class="mt-2 font-data-mono text-data-mono text-stone-text text-xs opacity-70">Must be at least 8 characters long.</p>
</div>
<!-- Confirm Password -->
<div>
<label class="block font-label-small text-label-small text-stone-text mb-1 uppercase tracking-wider" for="confirm_password">Confirm Password</label>
<input class="w-full bg-deep-surface border border-outline-variant rounded-DEFAULT py-3 px-4 font-body-main text-body-main text-parchment-text placeholder-muted-text focus:outline-none focus:border-antique-gold focus:ring-1 focus:ring-antique-gold focus:drop-shadow-[0_0_8px_rgba(245,166,35,0.4)] transition-all" id="confirm_password" name="confirm_password" required="" type="password"/>
</div>
<!-- Submit Button -->
<button class="w-full bg-antique-gold hover:bg-bright-gold text-cinema-black font-body-main text-body-main font-semibold py-4 rounded-DEFAULT flex justify-center items-center gap-2 hover:drop-shadow-[0_0_12px_rgba(245,166,35,0.6)] transition-all duration-300" type="submit">
                    Create Account
                    <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</form>
<!-- Secondary Link -->
<div class="mt-8 text-center border-t border-outline-variant/30 pt-6">
<a class="font-body-main text-body-main text-stone-text hover:text-antique-gold text-sm transition-colors flex justify-center items-center gap-1 group" href="#">
                    Already have an account? Sign in 
                    <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_right_alt</span>
</a>
</div>
</div>
</main>
</body></html>
