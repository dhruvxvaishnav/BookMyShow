          'FILL' 0,

<body class="bg-void-black text-on-surface min-h-screen flex items-center justify-center font-body-main selection:bg-primary-container selection:text-on-primary p-4">
<!-- Decorative background elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0 flex items-center justify-center">
<div class="absolute w-[800px] h-[800px] bg-primary-container/5 rounded-full blur-[120px] mix-blend-screen opacity-50"></div>
</div>
<!-- Login Card -->
<main class="w-full max-w-md relative z-10 bg-deep-surface shadow-[0_20px_60px_rgba(0,0,0,0.8)] overflow-hidden">
<!-- Premium Accent Bar -->
<div class="h-1 w-full bg-gradient-to-r from-royal-crimson via-gold-foil to-royal-crimson"></div>
<div class="p-8 sm:p-12 flex flex-col items-center">
<!-- Brand Logo Area -->
<div class="mb-8 flex flex-col items-center">
<span class="material-symbols-outlined text-[48px] text-antique-gold mb-4" style="font-variation-settings: 'FILL' 1;">movie</span>
<h1 class="font-headline-marquee text-headline-marquee text-antique-gold uppercase">CINEPLEX</h1>
<div class="w-12 h-[1px] bg-gradient-to-r from-transparent via-ornament-bronze to-transparent mt-4"></div>
</div>
<!-- Heading -->
<h2 class="font-display-hero text-display-hero text-parchment-text mb-8 text-center leading-tight">
                Sign in to your account
            </h2>
<!-- Form -->
<form class="w-full space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-small text-label-small text-muted-text uppercase tracking-wider block" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-stone-text group-focus-within:text-antique-gold transition-colors">mail</span>
<input class="w-full bg-void-black border border-outline-variant text-parchment-text font-data-mono text-data-mono pl-12 pr-4 py-4 focus:ring-0 focus:border-antique-gold focus:drop-shadow-[0_0_8px_rgba(245,166,35,0.3)] transition-all placeholder:text-muted-text/50" id="email" name="email" placeholder="user@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-small text-label-small text-muted-text uppercase tracking-wider block" for="password">Password</label>
<a class="font-label-small text-label-small text-antique-gold hover:text-gold-foil transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-stone-text group-focus-within:text-antique-gold transition-colors">lock</span>
<input class="w-full bg-void-black border border-outline-variant text-parchment-text font-data-mono text-data-mono pl-12 pr-12 py-4 focus:ring-0 focus:border-antique-gold focus:drop-shadow-[0_0_8px_rgba(245,166,35,0.3)] transition-all placeholder:text-muted-text/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-text hover:text-parchment-text transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-antique-gold text-cinema-black font-headline-marquee text-headline-marquee py-4 mt-8 hover:bg-bright-gold hover:drop-shadow-[0_0_12px_rgba(245,166,35,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 text-center">
<p class="font-body-main text-body-main text-muted-text">
                    New to Cineplex? 
                    <a class="text-antique-gold hover:text-bright-gold underline decoration-antique-gold/30 underline-offset-4 transition-colors" href="#">Create account</a>
</p>
</div><div class="mt-6 flex justify-center">
<a class="flex items-center gap-2 px-6 py-2 border border-ornament-bronze/50 text-antique-gold font-headline-marquee text-[12px] uppercase tracking-[0.2em] hover:bg-antique-gold/5 hover:border-antique-gold transition-all duration-300 group" href="#">
<span class="material-symbols-outlined text-[18px]">shield</span>
<span>Login to Admin Portal</span>
</a>
</div>
<!-- Ornamental Divider -->
<div class="w-full h-[1px] bg-gradient-to-r from-transparent via-ornament-bronze/50 to-transparent mt-8"></div>
</div>
<!-- Art Deco Corners (Decorative) -->
<div class="absolute top-4 left-4 w-4 h-4 border-t border-l border-ornament-bronze/30"></div>
<div class="absolute top-4 right-4 w-4 h-4 border-t border-r border-ornament-bronze/30"></div>
<div class="absolute bottom-4 left-4 w-4 h-4 border-b border-l border-ornament-bronze/30"></div>
<div class="absolute bottom-4 right-4 w-4 h-4 border-b border-r border-ornament-bronze/30"></div>
</main>
