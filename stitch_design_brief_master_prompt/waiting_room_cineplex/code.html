<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Waiting Room — Cineplex</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "seat-gray": "#6B7280",
                        "primary": "#ffc880",
                        "surface-variant": "#3c332a",
                        "cinema-black": "#0A0608",
                        "premium-purple": "#A855F7",
                        "inverse-surface": "#eee0d2",
                        "deep-surface": "#161619",
                        "surface-container-lowest": "#130d06",
                        "parchment-text": "#F5F5F7",
                        "error": "#ffb4ab",
                        "tertiary-container": "#3ac2ff",
                        "on-primary": "#452b00",
                        "on-surface-variant": "#d7c3ae",
                        "primary-fixed": "#ffddb4",
                        "elevated-surface": "#1E1E23",
                        "on-primary-container": "#644000",
                        "seat-gold": "#F5A623",
                        "recliner-teal": "#06B6D4",
                        "ornament-bronze": "#8B7355",
                        "surface-tint": "#ffb955",
                        "on-tertiary-fixed": "#001e2c",
                        "on-surface": "#eee0d2",
                        "on-error": "#690005",
                        "tertiary": "#9bd9ff",
                        "surface-container-highest": "#3c332a",
                        "surface-container-high": "#302920",
                        "on-secondary-container": "#ff9e98",
                        "secondary-fixed-dim": "#ffb3ae",
                        "on-secondary-fixed-variant": "#832524",
                        "tertiary-fixed": "#c4e7ff",
                        "error-container": "#93000a",
                        "void-black": "#0D0D0F",
                        "surface-bright": "#40382e",
                        "royal-crimson": "#7B1F1F",
                        "stone-text": "#9CA3AF",
                        "surface-container-low": "#211a12",
                        "on-secondary-fixed": "#410004",
                        "inverse-primary": "#835500",
                        "on-tertiary": "#00344a",
                        "on-primary-fixed": "#291800",
                        "secondary-container": "#862726",
                        "background": "#19120a",
                        "antique-gold": "#F5A623",
                        "secondary": "#ffb3ae",
                        "outline-variant": "#524534",
                        "surface-dim": "#19120a",
                        "surface": "#19120a",
                        "seat-green": "#22C55E",
                        "tertiary-fixed-dim": "#7cd0ff",
                        "bright-gold": "#F5C842",
                        "on-background": "#eee0d2",
                        "primary-fixed-dim": "#ffb955",
                        "on-tertiary-container": "#004d6a",
                        "on-primary-fixed-variant": "#633f00",
                        "outline": "#9f8e7a",
                        "on-secondary": "#630d10",
                        "on-error-container": "#ffdad6",
                        "primary-container": "#f5a623",
                        "seat-red": "#EF4444",
                        "surface-container": "#251e16",
                        "secondary-fixed": "#ffdad7",
                        "inverse-on-surface": "#372f26",
                        "success-green": "#22C55E",
                        "on-tertiary-fixed-variant": "#004c69",
                        "alert-red": "#EF4444",
                        "gold-foil": "#D4A843",
                        "muted-text": "#8B96A0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "section-gap": "48px",
                        "container-padding": "24px",
                        "unit": "8px",
                        "hero-height": "70vh",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "data-mono": ["JetBrains Mono"],
                        "headline-marquee": ["Inter"],
                        "display-hero": ["Playfair Display"],
                        "body-main": ["Inter"],
                        "label-small": ["Inter"]
                    },
                    "fontSize": {
                        "data-mono": ["14px", { "lineHeight": "1", "letterSpacing": "-0.01em", "fontWeight": "500" }],
                        "headline-marquee": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.2em", "fontWeight": "600" }],
                        "display-hero": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-main": ["16px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "label-small": ["11px", { "lineHeight": "1.4", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-void-black text-on-surface min-h-screen flex flex-col font-body-main relative overflow-hidden selection:bg-antique-gold/30 selection:text-antique-gold">
<!-- Atmospheric Deep Red Glow Background -->
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-royal-crimson/10 via-void-black to-void-black pointer-events-none z-0"></div>
<!-- Main Canvas Content -->
<main class="flex-grow flex items-center justify-center p-container-padding z-10">
<!-- Wait Room Premium Card -->
<div class="relative w-full max-w-xl bg-deep-surface border border-outline-variant shadow-[0_0_60px_rgba(0,0,0,0.9)] p-10 md:p-14">
<!-- Art Deco Gold Corner Brackets -->
<div class="absolute top-0 left-0 w-6 h-6 border-t-[3px] border-l-[3px] border-antique-gold m-3 opacity-80"></div>
<div class="absolute top-0 right-0 w-6 h-6 border-t-[3px] border-r-[3px] border-antique-gold m-3 opacity-80"></div>
<div class="absolute bottom-0 left-0 w-6 h-6 border-b-[3px] border-l-[3px] border-antique-gold m-3 opacity-80"></div>
<div class="absolute bottom-0 right-0 w-6 h-6 border-b-[3px] border-r-[3px] border-antique-gold m-3 opacity-80"></div>
<div class="flex flex-col items-center text-center space-y-10">
<!-- Animated/Glowing Hourglass Icon -->
<div class="relative">
<div class="absolute inset-0 bg-antique-gold blur-2xl opacity-20 rounded-full"></div>
<span class="material-symbols-outlined text-[64px] text-antique-gold drop-shadow-[0_0_15px_#F5A623] relative z-10" style="font-variation-settings: 'FILL' 1;">
                        hourglass_bottom
                    </span>
</div>
<!-- Ornamental Divider -->
<div class="w-full flex items-center justify-center opacity-80">
<div class="h-[1px] flex-grow bg-gradient-to-r from-transparent to-ornament-bronze"></div>
<div class="mx-4 w-2 h-2 rotate-45 bg-antique-gold"></div>
<div class="h-[1px] flex-grow bg-gradient-to-l from-transparent to-ornament-bronze"></div>
</div>
<!-- Header Typography -->
<div class="space-y-2">
<p class="font-headline-marquee text-headline-marquee text-gold-foil uppercase tracking-[0.3em]">Cineplex Box Office</p>
<h1 class="font-display-hero text-display-hero text-parchment-text leading-tight">Waiting Room</h1>
</div>
<!-- Queue Position Highlight Area -->
<div class="w-full bg-surface-container-highest border-y border-outline-variant/50 py-8 relative">
<div class="absolute inset-0 shadow-[inset_0_0_30px_rgba(0,0,0,0.8)] pointer-events-none"></div>
<p class="font-label-small text-label-small text-stone-text uppercase tracking-[0.15em] mb-3">Queue Position</p>
<div class="font-data-mono text-[72px] leading-none text-parchment-text tracking-tighter drop-shadow-[0_0_12px_rgba(245,245,247,0.4)]">
                        124
                    </div>
</div>
<!-- Glowing Progress Bar -->
<div class="w-full space-y-4">
<div class="h-2 w-full bg-void-black rounded-none border border-outline-variant/40 overflow-hidden relative shadow-[inset_0_2px_4px_rgba(0,0,0,0.6)]">
<div class="h-full bg-antique-gold w-[45%] relative drop-shadow-[0_0_10px_#F5A623]">
<!-- Specular highlight on progress bar -->
<div class="absolute top-0 right-0 bottom-0 w-8 bg-gradient-to-r from-transparent to-white/40"></div>
</div>
</div>
<p class="font-label-small text-label-small text-stone-text text-right uppercase tracking-wider">Securing connection...</p>
</div>
<!-- Instructional Message -->
<div class="space-y-6 pt-2">
<p class="font-body-main text-body-main text-on-surface-variant max-w-md mx-auto leading-relaxed">
                        The box office is exceptionally busy. You are currently in line for the blockbuster event <span class="text-parchment-text font-bold">"Dune: Part Two"</span>.
                    </p>
<!-- Alert/Warning Block -->
<div class="inline-flex items-center space-x-3 bg-error-container/10 border border-error/20 px-5 py-3 shadow-[0_0_15px_rgba(255,180,171,0.05)]">
<span class="material-symbols-outlined text-error text-xl" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="font-label-small text-label-small text-error uppercase tracking-[0.1em]">Do not refresh this page</span>
</div>
</div>
</div>
</div>
</main>
</body></html>
