version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookmyshow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9000:9000" # Prometheus metrics

    # OVERRIDE FOR DEV: Run cargo-watch to hot-reload the Rust backend
    command: cargo watch -x run
    volumes:
      - ./backend:/app # Mount your local code
      - backend_target:/app/target # Cache Rust builds (Crucial for speed)
      - cargo_registry:/usr/local/cargo/registry # Cache downloaded crates

    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8080"
      METRICS_PORT: "9000"
      LOG_FORMAT: "json"
      RUST_LOG: "debug" # Changed to debug for local development
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@bookmyshow.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-Admin@123}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      EMAIL_API_KEY: "${EMAIL_API_KEY:-}"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/bookmyshow"
      REDIS_URL: "redis://redis:6379/0"
      OTLP_ENDPOINT: "${OTLP_ENDPOINT:-}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"

    # OVERRIDE FOR DEV: Run Next.js in dev mode for Hot Module Replacement
    command: npm run dev
    volumes:
      - ./frontend:/app # Mount your local code
      - frontend_node_modules:/app/node_modules # Prevent host OS conflicts
      - frontend_next_cache:/app/.next # Cache Next.js build files

    environment:
      NODE_ENV: development # Changed from production to enable HMR
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}"
      NEXT_PUBLIC_SENTRY_DSN: "${NEXT_PUBLIC_SENTRY_DSN:-}"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data: # Added named volumes to hold caches so you never rebuild from scratch

  backend_target:
  cargo_registry:
  frontend_node_modules:
  frontend_next_cache:

networks:
  app-network:
    driver: bridge
